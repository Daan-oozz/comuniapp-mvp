<!DOCTYPE html>
<html lang="es">
<head>

<body>

    <div class="desktop-layout">
        
        <aside class="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><span>C</span></div>
                <span class="sidebar-app-name">ComuniApp</span>
            </div>
            <nav class="sidebar-nav">
                <a href="home.html" class="sidebar-item active">
                    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
                        <path d="M9 21V12h6v9"/>
                    </svg>
                    <span>Inicio</span>
                </a>
                <a href="mensajes.html" class="sidebar-item">
                    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span>Mensajes</span>
                </a>
                <a href="perfil_usuario.html" class="sidebar-item">
                    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span>Perfil</span>
                </a>
            </nav>

        <main class="desktop-main">
            <div class="desktop-topbar" style="flex-direction: column; align-items: flex-start; gap: 16px;">
                <a href="home.html" class="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Volver a Categorías
                </a>
                <h1 class="desktop-greeting">Resultados: Hogar</h1>
                <div class="filters-row">
                    <button class="chip">Cerca</button>
                    <button class="chip active">Mejor valorado</button>
                </div>
            </div>

            <section class="desktop-section">
                <div class="workers-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 0;">
                    
                    <a href="perfil_trabajador.html" class="worker-card">
                        <img src="https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Fproactivo.com.pe%2Fwp-content%2Fuploads%2F2023%2F11%2FFoto_Cemento-Andino.jpg&f=1&nofb=1&ipt=15c154df938ebc58387161f5435f90b43ae656313f69b2939f83b6e2a3e72092=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Don Manuel" class="worker-photo">
                        <div class="worker-info">
                            <h3>Don Manuel</h3>
                            <span class="prof">Maestro de obra · Hogar</span>
                            <div class="worker-meta">
                                <span class="star">
                                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                    4.8 <span class="count">(127)</span>
                                </span>
                            </div>
                        </div>
                    </a>

                    <a href="#" class="worker-card">
                        <img src="https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Luis Gómez" class="worker-photo">
                        <div class="worker-info">
                            <h3>Luis Gómez</h3>
                            <span class="prof">Plomero · Mecánica</span>
                            <div class="worker-meta">
                                <span class="star">
                                    <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                    4.2 <span class="count">(45)</span>
                                </span>
                            </div>
                        </div>
                    </a>
                </div>
            </section>
        </main>
    </div>


    <div class="app-container page-content mobile-layout">
        
        <header class="sticky-header">
            <a href="home.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Resultados
            </a>
        </header>

        <main>
            <div class="filters-row" style="padding-left: 24px; padding-right: 24px;">
                <button class="chip">Cerca</button>
                <button class="chip active">Mejor valorado</button>
            </div>

            <div class="workers-list">
                
                <a href="perfil_trabajador.html" class="worker-card">
                    <img src="https://images.unsplash.com/photo-1541888086425-d81bb19240f5?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Don Manuel" class="worker-photo">
                    <div class="worker-info">
                        <h3>Don Manuel</h3>
                        <span class="prof">Maestro de obra · Hogar</span>
                        <div class="worker-meta">
                            <span class="star">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                4.8 <span class="count">(127)</span>
                            </span>
                        </div>
                    </div>
                </a>

                <a href="#" class="worker-card">
                    <img src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?ixlib=rb-1.2.1&auto=format&fit=crop&w=150&q=80" alt="Carlos Ruiz" class="worker-photo">
                    <div class="worker-info">
                        <h3>Carlos Ruiz</h3>
                        <span class="prof">Electricista · Hogar</span>
                        <div class="worker-meta">
                            <span class="star">
                                <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                                4.5 <span class="count">(84)</span>
                            </span>
                        </div>
                    </div>
                </a>
            </div>
        </main>

        <nav class="bottom-nav">
            <a href="home.html" class="nav-item active">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                Inicio
            </a>
            <a href="mensajes.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                Mensajes
            </a>
            <a href="perfil_usuario.html" class="nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                Perfil
            </a>
        </nav>
